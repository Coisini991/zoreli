name: Deploy Quartz Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"

      - name: Configure Git
        run: |
          git config --global user.email "runner@github.com"
          git config --global user.name "GitHub Runner"

      - name: Install dependencies
        run: npm install

      - name: Install Quartz plugins
        run: |
          npm install @quartz-community/bases-page
          npm install @quartz-community/canvas-page
          npm install @quartz-community/content-meta
          npm install @quartz-community/content-page
          npm install @quartz-community/encrypted-pages
          npm install @quartz-community/folder-page
          npm install @quartz-community/stacked-pages
          npm install @quartz-community/syntax-highlighting
          npm install @quartz-community/table-of-contents
          npm install @quartz-community/tag-page

      - name: Build Quartz site
        run: npx quartz build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
